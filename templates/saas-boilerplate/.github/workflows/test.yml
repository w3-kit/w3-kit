name: Solidity Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'contracts/**'
      - 'test/**'
      - 'hardhat.config.ts'
  pull_request:
    branches: [ main ]
    paths:
      - 'contracts/**'
      - 'test/**'
      - 'hardhat.config.ts'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Compile contracts
        run: npx hardhat compile
        
      - name: Run tests
        run: npx hardhat test
        
      - name: Run coverage
        run: npx hardhat coverage 